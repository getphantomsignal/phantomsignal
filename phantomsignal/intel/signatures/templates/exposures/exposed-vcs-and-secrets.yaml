id: exposed-vcs-and-cloud-keys
info:
  name: Exposed VCS directory or leaked cloud key in surfaced content
  severity: critical
  tags: [exposure, secrets, misconfig]
  reference:
    - https://owasp.org/www-community/vulnerabilities/Information_exposure_through_query_strings_in_url
match:
  matchers-condition: or
  matchers:
    # Exposed source control metadata reachable over HTTP.
    - part: data.url
      type: regex
      condition: or
      patterns:
        - '/\.git/(config|HEAD)'
        - '/\.svn/entries'
        - '/\.hg/'
    # High-signal cloud/API key formats appearing in crawled/api-hunt content.
    - part: data
      type: regex
      condition: or
      patterns:
        - 'AKIA[0-9A-Z]{16}'                     # AWS access key id
        - 'AIza[0-9A-Za-z\-_]{35}'               # Google API key
        - 'sk-[A-Za-z0-9]{20,}'                  # generic secret key
        - 'xox[baprs]-[0-9A-Za-z-]{10,}'         # Slack token
        - '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'
