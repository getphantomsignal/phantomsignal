{% extends "base.html" %}
{% block title %}500 — Server Error{% endblock %}
{% block content %}
<div style="text-align:center;padding:6rem 2rem;">
  <div style="font-size:6rem;color:var(--neon-pink);text-shadow:0 0 20px var(--neon-pink);margin-bottom:1rem;">500</div>
  <h1 class="glitch-text" data-text="Something Went Wrong">Something Went Wrong</h1>
  <p style="color:var(--text-dim);margin:1rem 0 2rem;">A server error occurred. Please try again.</p>
  <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">← Back to Dashboard</a>
</div>
{% endblock %}
