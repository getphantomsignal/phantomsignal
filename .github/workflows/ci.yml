name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Import check
        run: |
          python -c "import owlscan; print('v' + owlscan.__version__)"
          python -c "from owlscan.core.config import OwlScanConfig"
          python -c "from owlscan.core.models import Scan"
          python -c "from owlscan.intel.apis.base import BaseIntelAPI, get_registered_apis"
          python -c "import owlscan.intel.apis.all_apis; from owlscan.intel.apis.base import get_registered_apis; assert len(get_registered_apis()) > 0"

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pip install pytest pytest-asyncio -q
            pytest tests/ -v
          else
            echo "No test suite yet — import check passed."
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install flake8
        run: pip install flake8 -q

      - name: Flake8
        run: flake8 owlscan/ --max-line-length=120 --ignore=E501,W503,E203
