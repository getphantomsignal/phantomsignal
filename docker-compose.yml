version: "3.9"

services:
  owlscan:
    build: .
    image: owlscan:latest
    container_name: owlscan
    ports:
      - "5000:5000"
    volumes:
      - owlscan-data:/app/data
      - owlscan-exports:/app/exports
      - ./config:/app/config:ro
    environment:
      - OWLSCAN_HOST=0.0.0.0
      - OWLSCAN_PORT=5000
      - OWLSCAN_DB_URL=sqlite:////app/data/owlscan.db
      # Add your API keys as environment variables:
      # - SHODAN_API_KEY=your-key
      # - VIRUSTOTAL_API_KEY=your-key
      # - HUNTER_API_KEY=your-key
      # - HIBP_API_KEY=your-key
      # - GREYNOISE_API_KEY=your-key
      # - IPINFO_TOKEN=your-token
      # - ABUSEIPDB_API_KEY=your-key
      # - ALIENVAULT_API_KEY=your-key
      # - GITHUB_TOKEN=your-token
      # - SECURITYTRAILS_API_KEY=your-key
      # - URLSCAN_API_KEY=your-key
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Tor proxy for Ghost Mode
  tor:
    image: dperson/torproxy:latest
    container_name: owlscan-tor
    ports:
      - "9050:9050"
      - "8118:8118"
    restart: unless-stopped
    profiles: ["ghost"]

volumes:
  owlscan-data:
  owlscan-exports:
